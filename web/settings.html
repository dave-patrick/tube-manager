<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Tube Manager</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'self';">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4"><div class="w-8 h-8 rounded shrink-0 bg-blue-600 flex items-center justify-center text-white"><i class="fa-solid fa-play text-sm"></i></div><div><h1 class="text-sm font-bold tracking-wide text-white leading-tight">Tube Manager</h1><p class="text-[10px] text-gray-400">Automated Playlist Orchestrator</p></div></div>
        <div class="flex items-center gap-6"><div class="text-right hidden lg:block cursor-pointer" onclick="window.location.href='/'"><div class="text-[10px] text-blue-400 mt-0.5 flex items-center justify-end gap-1" title="Click to view scan details on Dashboard">[Idle • Last Full Scan: <span id="last-scan">loading...</span>] <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i></div></div><div class="w-10 h-10 rounded-full bg-[#2a2f3a] border border-[#374151] overflow-hidden flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-gray-400"></i></div><div class="flex gap-2"><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-border-all"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-regular fa-bell"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-arrow-right-from-bracket"></i></button></div></div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#2a2f3a] bg-[#16191f] p-4 flex flex-col gap-1 shrink-0 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
            <a href="/maintenance" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-wrench w-5 text-center"></i> Maintenance Queue</a>
            <a href="/rules" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-code w-5 text-center"></i> Rules & Mappings</a>
            <a href="/ai" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-microchip w-5 text-center"></i> AI Integration</a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"><i class="fa-solid fa-gear w-5 text-center"></i> Settings</a>
        </aside>
        <main class="flex-1 overflow-y-auto p-6 bg-[#121419]">
            <div class="flex flex-col gap-4 min-w-[1200px]">
                <h2 class="text-xl font-bold text-white">Settings</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bento-card p-4">
                        <h3 class="text-xs font-semibold text-gray-300 mb-4">YouTube API</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">API Key</label>
                                <input type="password" id="yt-api-key" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none" placeholder="Enter API key">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">OAuth Client ID</label>
                                <input type="text" id="oauth-client-id" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none" placeholder="xxxxx.apps.googleusercontent.com">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">OAuth Client Secret</label>
                                <input type="password" id="oauth-client-secret" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none" placeholder="••••••••">
                            </div>
                            <div class="pt-2 border-t border-[#2a2f3a] space-y-3">
                                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs py-2 rounded"><i class="fa-solid fa-floppy-disk mr-2"></i>Save All Settings</button>
                                <div class="border-t border-[#2a2f3a] pt-2 space-y-2">
                                    <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="api-first" class="accent-blue-500" checked> Use API-first mode (fallback to headless)</label>
                                    <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="auto-refresh" class="accent-blue-500" checked> Auto-refresh tokens</label>
                                </div>
                                <button onclick="connectYouTube()" class="w-full bg-[#c8102e] hover:bg-[#b00f2a] text-white text-xs py-2 rounded flex items-center justify-center gap-2"><i class="fa-brands fa-youtube"></i> Connect YouTube Account (OAuth)</button>
                                <div id="yt-status" class="text-[10px] text-gray-400 text-center"></div>
                            </div>
                        </div>
                    </div>
                    <div class="bento-card p-4">
                        <h3 class="text-xs font-semibold text-gray-300 mb-4">General</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">Default Playlist Privacy</label>
                                <select id="default-privacy" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                                    <option value="private">Private</option>
                                    <option value="unlisted">Unlisted</option>
                                    <option value="public">Public</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">Scan Interval</label>
                                <select id="scan-interval" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                                    <option value="15min">Every 15 minutes</option>
                                    <option value="hourly" selected>Every hour</option>
                                    <option value="6hour">Every 6 hours</option>
                                    <option value="daily">Daily</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">Max Concurrent Operations</label>
                                <input type="number" id="max-concurrent" value="3" min="1" max="10" class="w-20 bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                            </div>
                            <div class="pt-2 border-t border-[#2a2f3a] space-y-2">
                                <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="auto-sort" class="accent-blue-500" checked> Auto-sort new videos</label>
                                <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="sync-watch-later" class="accent-blue-500" checked> Sync Watch Later on scan</label>
                                <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="notify-failures" class="accent-blue-500"> Notify on failures</label>
                                <label class="flex items-center gap-2 text-xs text-gray-300"><input type="checkbox" id="dark-mode" class="accent-blue-500" checked> Dark mode only</label>
                            </div>
                        </div>
                    </div>
                    <div class="bento-card p-4">
                        <h3 class="text-xs font-semibold text-gray-300 mb-4">Storage & Data</h3>
                        <div class="space-y-4">
                            <div class="bg-[#20242c] p-3 rounded border border-[#2a2f3a]"><div class="text-xs text-gray-400">Database Size</div><div class="text-lg font-bold text-white" id="db-size">47.3 MB</div></div>
                            <div class="bg-[#20242c] p-3 rounded border border-[#2a2f3a]"><div class="text-xs text-gray-400">Cache Size</div><div class="text-lg font-bold text-white" id="cache-size">12.1 MB</div></div>
                            <div class="bg-[#20242c] p-3 rounded border border-[#2a2f3a]"><div class="text-xs text-gray-400">Thumbnails</div><div class="text-lg font-bold text-white" id="thumb-count">1,331 files</div></div>
                            <div class="pt-2 border-t border-[#2a2f3a] space-y-2">
                                <button class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-2 rounded">Clear Thumbnail Cache</button>
                                <button class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-2 rounded">Vacuum Database</button>
                                <button class="w-full bg-red-600/20 hover:bg-red-600/30 border border-red-500/30 text-red-400 text-xs py-2 rounded">Export All Data (JSON)</button>
                            </div>
                        </div>
                    </div>
                    <div class="bento-card p-4">
                        <h3 class="text-xs font-semibold text-gray-300 mb-4">Advanced</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">Log Level</label>
                                <select id="log-level" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                                    <option value="DEBUG">DEBUG</option>
                                    <option value="INFO" selected>INFO</option>
                                    <option value="WARNING">WARNING</option>
                                    <option value="ERROR">ERROR</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400 mb-1 block">Webhook URL (optional)</label>
                                <input type="url" id="webhook-url" placeholder="https://your-webhook.com/endpoint" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                            </div>
                            <div class="pt-2 border-t border-[#2a2f3a] space-y-2">
                                <button class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-2 rounded">Test Webhook</button>
                                <button class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-2 rounded">View System Logs</button>
                                <button class="w-full bg-red-600/20 hover:bg-red-600/30 border border-red-500/30 text-red-400 text-xs py-2 rounded">Reset All Settings</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                if (!response.ok) return;
                const data = await response.json();
                document.getElementById('yt-api-key').placeholder = data.youtube_api_key || 'Enter API key';
                document.getElementById('oauth-client-id').value = data.oauth_client_id || '';
                document.getElementById('oauth-client-secret').placeholder = data.oauth_client_secret ? '••••••••' : 'Enter secret';
                document.getElementById('default-privacy').value = data.default_privacy || 'private';
                document.getElementById('scan-interval').value = data.scan_interval || 'hourly';
                document.getElementById('max-concurrent').value = data.max_concurrent || 3;
                document.getElementById('auto-sort').checked = data.auto_sort !== false;
                document.getElementById('sync-watch-later').checked = data.sync_watch_later !== false;
                document.getElementById('notify-failures').checked = data.notify_failures === true;
                document.getElementById('dark-mode').checked = data.dark_mode !== false;
                document.getElementById('log-level').value = data.log_level || 'INFO';
                document.getElementById('webhook-url').value = data.webhook_url || '';
            } catch (e) {
                console.error(e);
            }
        }
        
        async function saveSettings() {
            const payload = {
                youtube_api_key: document.getElementById('yt-api-key').value || undefined,
                oauth_client_id: document.getElementById('oauth-client-id').value || undefined,
                oauth_client_secret: document.getElementById('oauth-client-secret').value || undefined,
                default_privacy: document.getElementById('default-privacy').value,
                scan_interval: document.getElementById('scan-interval').value,
                max_concurrent: parseInt(document.getElementById('max-concurrent').value),
                auto_sort: document.getElementById('auto-sort').checked,
                sync_watch_later: document.getElementById('sync-watch-later').checked,
                notify_failures: document.getElementById('notify-failures').checked,
                dark_mode: document.getElementById('dark-mode').checked,
                log_level: document.getElementById('log-level').value,
                webhook_url: document.getElementById('webhook-url').value || undefined,
            };
            
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                alert('Settings saved');
            } catch (e) {
                alert('Failed to save');
            }
        }
        
        async function connectYouTube() {
            const status = document.getElementById('yt-status');
            status.textContent = 'Opening OAuth...';
            status.className = 'text-[10px] text-blue-400 text-center mt-2';
            try {
                const resp = await fetch('/auth/youtube');
                const data = await resp.json();
                if (data.auth_url) {
                    window.open(data.auth_url, '_blank', 'width=600,height=700');
                    status.textContent = 'Complete OAuth in popup, then refresh';
                    status.className = 'text-[10px] text-green-400 text-center mt-2';
                } else {
                    status.textContent = data.error || 'OAuth not configured';
                    status.className = 'text-[10px] text-red-400 text-center mt-2';
                }
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                status.className = 'text-[10px] text-red-400 text-center mt-2';
            }
        }
        
        
        // Load scan status in header
        async function loadDashboardStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('last-scan').textContent = data.last_scan || 'just now';
                }
            } catch (e) {
                console.log('Stats endpoint not available');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardStats();
            setInterval(loadDashboardStats, 30000);
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardStats();
            loadSettings();
        });
    </script>
</body>
</html>
