<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Queue - YT Playlist Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4"><div class="w-8 h-8 rounded shrink-0 bg-blue-600 flex items-center justify-center text-white"><i class="fa-solid fa-play text-sm"></i></div><div><h1 class="text-sm font-bold tracking-wide text-white leading-tight">YT Playlist Manager</h1><p class="text-[10px] text-gray-400">Automated Playlist Orchestrator</p></div></div>
        <div class="flex items-center gap-6"><div class="text-right hidden lg:block"><div class="text-[10px] text-blue-400 mt-0.5">[Idle • Last Full Scan: <span id="last-scan">loading...</span> • Trip: Grand Junction, CO: 27 days]</div></div><div class="w-10 h-10 rounded-full bg-[#2a2f3a] border border-[#374151] overflow-hidden flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-gray-400"></i></div><div class="flex gap-2"><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-border-all"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-regular fa-bell"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-arrow-right-from-bracket"></i></button></div></div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#2a2f3a] bg-[#16191f] p-4 flex flex-col gap-1 shrink-0 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
            <a href="/maintenance" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"><i class="fa-solid fa-wrench w-5 text-center"></i> Maintenance Queue</a>
            <a href="/rules" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-code w-5 text-center"></i> Rules & Mappings</a>
            <a href="/ai" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-microchip w-5 text-center"></i> AI Integration</a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-gear w-5 text-center"></i> Settings</a>
        </aside>
        <main class="flex-1 overflow-y-auto p-6 bg-[#121419]">
            <div class="flex flex-col gap-4 min-w-[1200px]">
                <h2 class="text-xl font-bold text-white">Maintenance Queue</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a"><h3 class="text-xs font-semibold text-gray-300">Move from X to Y</h3></div>
                        <div class="p-3 overflow-y-auto flex-1" id="move-queue"></div>
                        <div class="p-3 border-t border-[#2a2f3a] bg-[#1a1d24]"><button class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs py-1.5 rounded">Apply All Moves</button></div>
                    </div>
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a"><h3 class="text-xs font-semibold text-gray-300">Duplicated Videos</h3></div>
                        <div class="p-3 overflow-y-auto flex-1" id="dup-queue"></div>
                        <div class="p-3 border-t border-[#2a2f3a] bg-[#1a1d24]"><button class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs py-1.5 rounded">Resolve All</button></div>
                    </div>
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a"><h3 class="text-xs font-semibold text-gray-300">Misplaced Videos</h3></div>
                        <div class="p-3 overflow-y-auto flex-1" id="misplaced-queue"></div>
                        <div class="p-3 border-t border-[#2a2f3a] bg-[#1a1d24]"><button class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs py-1.5 rounded">Fix All</button></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function loadMaintenance() {
            fetch('/api/maintenance')
                .then(r => r.json())
                .then(data => {
                    renderQueue('move-queue', data.move_from_x_to_y || [], 'move');
                    renderQueue('dup-queue', data.duplicated_videos || [], 'dup');
                    renderQueue('misplaced-queue', data.misplaced_videos || [], 'misplaced');
                });
        }
        function renderQueue(elId, items, type) {
            const el = document.getElementById(elId);
            if (!items.length) { el.innerHTML = '<div class="text-[10px] text-gray-400 text-center py-4">No items</div>'; return; }
            el.innerHTML = items.map(item => `
                <div class="flex items-center gap-2 bg-[#20242c] p-1.5 rounded border border-[#2a2f3a] mb-2">
                    <div class="w-8 h-6 bg-gray-700 rounded overflow-hidden flex-shrink-0"><img src="${item.thumbnail || 'https://picsum.photos/32/24'}" class="w-full h-full object-cover"></div>
                    <div class="flex-1 min-w-0"><div class="text-[10px] text-white truncate">${item.title}</div><div class="text-[9px] text-gray-400">${item.from_playlist} → ${item.to_playlist || '?'}</div></div>
                    ${type === 'move' ? `<select class="bg-blue-600 text-white text-[10px] rounded px-2 py-1 w-32 outline-none border-none"><option>${item.suggested || 'Move from X to Y'}</option></select>` : ''}
                    ${type === 'dup' ? `<div class="flex gap-1"><button class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded">Keep</button><button class="bg-[#2a2f3a] text-gray-300 text-[10px] px-2 py-1 rounded">Remove</button></div>` : ''}
                    ${type === 'misplaced' ? `<select class="bg-blue-600 text-white text-[10px] rounded px-2 py-1 w-32 outline-none border-none"><option>Move to ${item.suggested || 'Correct Playlist'}</option></select>` : ''}
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', loadMaintenance);
    </script>
</body>
</html>
