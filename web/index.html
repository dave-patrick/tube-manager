"""Modern UI for Tube Manager - Matt Black + Blue Coporscheem."""
from __future__ import annotations

from pathlib import Path


def build() -> str:
    return """<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tube Manager</title>
  <style>
    :root {
      --bg: #04060b;
      --surface: #0a0e17;
      --panel: #0f1520;
      --accent-low: #1b2a5a;
      --accent: #2648c3;
      --accent-2: #3066ff;
      --text: #edf2ff;
      --muted: #7b8bb5;
      --border: #172033;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 28px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: 0.4px; }
    .bar {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    input, select, button, textarea {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font: inherit;
    }
    button { cursor: pointer; }
    button.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-color: var(--accent-2); color: #fff; font-weight: 600; }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      transition: transform 120ms ease;
    }
    .meta { color: var(--muted); font-size: 13px; }
    .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .pill {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
      user-select: none;
    }
    .pill.active { outline: 2px solid var(--accent-2); }
    details.detail {
      margin-top: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    details.detail summary { cursor: pointer; color: var(--muted); }
    pre { white-space: pre-wrap; word-wrap: break-word; background: #090d18; padding: 12px; border-radius: 10px; overflow: auto; }
    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
    }
    .counters { display: flex; gap: 10px; flex-wrap: wrap; }
    .counters .pill { cursor: pointer; }
    footer { margin-top: 24px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
    </header>
    <div class="bar">
      <div class="counters" id="statusPills">
        <span class="pill active" data-status="">All</span>
        <span class="pill" data-status="pending">Pending</span>
        <span class="pill" data-status="running">Running</span>
        <span class="pill" data-status="completed">Completed</span>
        <span class="pill" data-status="failed">Failed</span>
      </div>
      <input id="search" placeholder="Search by title or id" />
    </div>
    <div class="card">
      <div class="row">
        <div>
          <strong>New task</strong>
          <div class="meta">Create and queue a task.</div>
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <input id="newTitle" placeholder="Title" />
        <select id="newType">
          <option value="generic">generic</option>
          <option value="youtube">youtube</option>
          <option value="playlist">playlist</option>
          <option value="home">home</option>
          <option value="code">code</option>
        </select>
        <input id="newPriority" placeholder="priority: low|medium|high" />
      </div>
      <div class="row" style="margin-top:10px;">
        <textarea id="newPayload" rows="2" placeholder="Optional JSON payload"></textarea>
        <button id="create" class="primary">Create</button>
      </div>
    </div>
    <div class="grid" id="taskList"></div>
  </div>

  <script>
    const API = "";
    async function api(path, opts = {}) {
      const res = await fetch(API + path, { ...opts, headers: { "Content-Type": "application/json", ...(opts.headers || {}) } });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }
    async function loadTasks() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const data = await api("/tasks");
      let tasks = data.tasks || [];
      const status = document.getElementById("statusFilter") && document.getElementById("statusFilter").value;
      if (status) tasks = tasks.filter(t => t.status === status);
      if (q) tasks = tasks.filter(t => ((t.title || "") + " " + (t.id || "")).toLowerCase().includes(q));
      render(tasks);
    }
    function render(tasks) {
      const root = document.getElementById("taskList");
      root.innerHTML = "";
      if (!tasks.length) {
        root.innerHTML = `<div class="empty">No tasks found. Create one above.</div>`;
        return;
      }
      for (const t of tasks) {
        const card = document.createElement("div");
        card.className = "card";
        const payloadText = t.payload ? JSON.stringify(t.payload, null, 2) : "";
        card.innerHTML = `
          <div class="row">
            <div>
              <strong>${escapeHtml(t.title)}</strong>
              <div class="meta">${escapeHtml(t.id)} • ${escapeHtml(t.type)} • ${escapeHtml(t.status)}</div>
            </div>
            <span class="pill">${escapeHtml(String(t.priority || ""))}</span>
          </div>
          ${payloadText ? `<details class="detail"><summary>Payload</summary><pre>${escapeHtml(payloadText)}</pre></details>` : ""}
          <div class="row">
            <span class="meta">${escapeHtml(t.created_at || "")} • ${escapeHtml(t.updated_at || "")}</span>
            <div class="actions">
              <button data-act="run" data-id="${escapeHtml(t.id)}">Run</button>
              <button data-act="delete" data-id="${escapeHtml(t.id)}">Delete</button>
            </div>
          </div>
        `;
        root.appendChild(card);
      }
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[m]);
    }
    document.getElementById("taskList").addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const id = btn.getAttribute("data-id");
      if (btn.getAttribute("data-act") === "run") {
        await api(`/tasks/${id}/run`, { method: "POST" });
        await loadTasks();
      } else if (btn.getAttribute("data-act") === "delete") {
        await api(`/tasks/${id}`, { method: "DELETE" });
        await loadTasks();
      }
    });
    document.getElementById("create").addEventListener("click", async () => {
      const title = document.getElementById("newTitle").value.trim();
      const task_type = document.getElementById("newType").value;
      const priority = document.getElementById("newPriority").value.trim() || null;
      let payload = null;
      const payloadRaw = document.getElementById("newPayload").value.trim();
      if (payloadRaw) {
        try { payload = JSON.parse(payloadRaw); } catch (err) { alert("Invalid JSON payload"); return; }
      }
      if (!title) { alert("Title required"); return; }
      await api("/tasks", { method: "POST", body: JSON.stringify({ title, task_type, priority, payload }) });
      document.getElementById("newTitle").value = "";
      document.getElementById("newPriority").value = "";
      document.getElementById("newPayload").value = "";
      await loadTasks();
    });
    document.getElementById("search").addEventListener("input", loadTasks);
    document.getElementById("statusPills").addEventListener("click", async (e) => {
      const pill = e.target.closest(".pill");
      if (!pill) return;
      document.querySelectorAll("#statusPills .pill").forEach(el => el.classList.remove("active"));
      pill.classList.add("active");
      const prev = document.getElementById("statusFilter");
      if (!prev) {
        const input = document.createElement("input");
        input.id = "statusFilter";
        input.type = "hidden";
        document.querySelector(".toolbar").appendChild(input);
      }
      document.getElementById("statusFilter").value = pill.dataset.status || "";
      await loadTasks();
    });
    loadTasks();
  </script>
</body>
</html>
"""
