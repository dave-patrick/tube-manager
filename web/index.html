<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .bento-card {
            background-color: #1a1d24;
            border: 1px solid #2a2f3a;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        #scan-detail-panel {
            position: fixed;
            top: 60px;
            right: 20px;
            width: 420px;
            max-height: 80vh;
            background: #16191f;
            border: 1px solid #2a2f3a;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        #scan-detail-panel.visible { display: flex; }
        #scan-detail-header {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2f3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #scan-detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 12px;
            line-height: 1.6;
        }
        .scan-entry {
            margin-bottom: 8px;
            padding: 8px;
            background: #0a0c10;
            border-radius: 6px;
            border-left: 3px solid #3066ff;
        }
        .scan-entry-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #7b8bb5;
            margin-bottom: 4px;
        }
        .scan-entry-message {
            color: #e5e5e5;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        .scan-entry.error { border-left-color: #ff4444; }
        .scan-entry.warn { border-left-color: #ffaa00; }
        .scan-entry.success { border-left-color: #44ff88; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">

    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 rounded shrink-0 bg-blue-600 flex items-center justify-center text-white">
                <i class="fa-solid fa-play text-sm"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-wide text-white leading-tight">Tube Manager</h1>
                <p class="text-[10px] text-gray-400">Automated Playlist Orchestrator</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="text-right hidden lg:block cursor-pointer" onclick="toggleScanDetail()" style="user-select: none;">
                <div class="text-[10px] text-blue-400 mt-0.5 flex items-center justify-end gap-1" title="Click for scan details">
                    [Idle • Last Full Scan: <span id="last-scan">loading...</span>]
                    <i class="fa-solid fa-chevron-down text-[9px] opacity-50 hover:opacity-100 transition-opacity"></i>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#2a2f3a] border border-[#374151] overflow-hidden flex items-center justify-center shrink-0">
                <i class="fa-solid fa-user text-gray-400"></i>
            </div>
            <div class="flex gap-2">
                <button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center" title="Layout"><i class="fa-solid fa-border-all"></i></button>
                <button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center" title="Notifications"><i class="fa-regular fa-bell"></i></button>
                <button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center" title="Logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </div>
    </header>

    <!-- Scan Detail Panel -->
    <div id="scan-detail-panel">
        <div id="scan-detail-header">
            <span class="text-xs font-semibold text-gray-300">Scan Details</span>
            <button onclick="toggleScanDetail()" class="text-gray-400 hover:text-white p-1"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="scan-detail-content">
            <div class="text-[10px] text-gray-500 text-center py-8">No scan data yet. Run a Full Cluster Scan to see details here.</div>
        </div>
    </div>
</body>
</html>
