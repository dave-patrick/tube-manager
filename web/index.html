<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; background: #121419; color: #e5e5e5; padding: 20px; }
        .card { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; padding: 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Tube Manager</h1>
    <div class="card">Dashboard loaded successfully</div>
    <div class="card" id="api">Testing API...</div>
    <script>
        fetch('/api/stats').then(r=>r.json()).then(d=>{
            document.getElementById('api').innerHTML = 'API: ' + JSON.stringify(d);
        }).catch(e=>{
            document.getElementById('api').innerHTML = 'API Error: ' + e.message;
        });
    </script>
</body>
</html>
