<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules & Mappings - YT Playlist Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4"><div class="w-8 h-8 rounded shrink-0 bg-blue-600 flex items-center justify-center text-white"><i class="fa-solid fa-play text-sm"></i></div><div><h1 class="text-sm font-bold tracking-wide text-white leading-tight">YT Playlist Manager</h1><p class="text-[10px] text-gray-400">Automated Playlist Orchestrator</p></div></div>
        <div class="flex items-center gap-6"><div class="text-right hidden lg:block"><div class="text-[10px] text-blue-400 mt-0.5">[Idle • Last Full Scan: <span id="last-scan">loading...</span>]</div></div><div class="w-10 h-10 rounded-full bg-[#2a2f3a] border border-[#374151] overflow-hidden flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-gray-400"></i></div><div class="flex gap-2"><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-border-all"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-regular fa-bell"></i></button><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-arrow-right-from-bracket"></i></button></div></div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#2a2f3a] bg-[#16191f] p-4 flex flex-col gap-1 shrink-0 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
            <a href="/maintenance" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-wrench w-5 text-center"></i> Maintenance Queue</a>
            <a href="/rules" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"><i class="fa-solid fa-code w-5 text-center"></i> Rules & Mappings</a>
            <a href="/ai" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-microchip w-5 text-center"></i> AI Integration</a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-gear w-5 text-center"></i> Settings</a>
        </aside>
        <main class="flex-1 overflow-y-auto p-6 bg-[#121419]">
            <div class="flex flex-col gap-4 min-w-[1200px]">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-white">Rules & Mappings</h2>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a">
                            <div class="flex gap-4 text-[10px] text-gray-400">
                                <span class="text-blue-400 border-b border-blue-400 pb-1">JSON Editor</span>
                                <span>YAML</span>
                                <span>Regex Builder</span>
                            </div>
                        </div>
                        <textarea id="rules-editor" class="flex-1 p-3 bg-[#0a0c10] font-mono text-[10px] text-gray-300 border-none outline-none resize-none" spellcheck="false">{
  "category": {
    "regex": "\\w+"
  },
  "channel": {
    "UC_x5XG1OV2P6uZZ5FSM9Ttw": {
      "playlist": "PL_tech"
    },
    "UC_latest": {
      "playlist": "PL_learning"
    }
  },
  "title_patterns": [
    { "regex": "(?i)\\b(tutorial|how.to|guide)\\b", "playlist": "PL_learning" },
    { "regex": "(?i)\\b(review|unboxing|first.look)\\b", "playlist": "PL_reviews" },
    { "regex": "(?i)\\b(live|stream|premiere)\\b", "playlist": "PL_live" }
  ],
  "duration_rules": {
    "short": { "max_seconds": 300, "playlist": "PL_shorts" },
    "long": { "min_seconds": 3600, "playlist": "PL_deep_dive" }
  }
}</textarea>
                        <div class="p-3 border-t border-[#2a2f3a] bg-[#1a1d24] flex gap-2">
                            <button onclick="applyRules()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-xs py-1.5 rounded">Apply Rules</button>
                            <button onclick="validateRules()" class="flex-1 bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-1.5 rounded">Validate JSON</button>
                        </div>
                    </div>
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a"><h3 class="text-xs font-semibold text-gray-300">Channel → Playlist Mappings</h3></div>
                        <div class="p-3 overflow-y-auto flex-1" id="mappings-list">Loading...</div>
                        <div class="p-3 border-t border-[#2a2f3a] bg-[#1a1d24]"><button onclick="saveMappings()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs py-1.5 rounded">Save Mappings</button></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        async function loadMappings() {
            try {
                const response = await fetch('/api/mappings');
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                const list = document.getElementById('mappings-list');
                if (!data.mappings || !data.mappings.length) {
                    list.innerHTML = '<div class="text-[10px] text-gray-400 text-center py-4">No channel mappings configured.</div>';
                    return;
                }
                list.innerHTML = data.mappings.map(m => `
                    <div class="flex items-center gap-2 p-2 hover:bg-[#20242c] rounded">
                        <img src="${m.thumbnail || 'https://picsum.photos/24'}" class="w-6 h-6 rounded-full object-cover">
                        <div class="flex-1 min-w-0 text-xs text-gray-300 truncate">${m.channel}</div>
                        <select class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-2 py-1 outline-none w-40" data-channel="${m.channel_id}">
                            <option ${m.playlist === 'PL_tech' ? 'selected' : ''}>PL_tech</option>
                            <option ${m.playlist === 'PL_news' ? 'selected' : ''}>PL_news</option>
                            <option ${m.playlist === 'PL_learning' ? 'selected' : ''}>PL_learning</option>
                            <option ${m.playlist === 'PL_reviews' ? 'selected' : ''}>PL_reviews</option>
                            <option>Create new...</option>
                        </select>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        function applyRules() {
            const rules = document.getElementById('rules-editor').value;
            fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'apply_rules', payload: {rules}})
            });
        }
        
        function validateRules() {
            const rules = document.getElementById('rules-editor').value;
            try {
                JSON.parse(rules);
                alert('Valid JSON');
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }
        
        function saveMappings() {
            const mappings = {};
            document.querySelectorAll('#mappings-list select').forEach(sel => {
                mappings[sel.dataset.channel] = sel.value;
            });
            // Could POST to API here
            alert('Mappings saved locally');
        }
        
        document.addEventListener('DOMContentLoaded', loadMappings);
    </script>
</body>
</html>
