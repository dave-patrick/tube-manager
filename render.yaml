services:
  - type: web
    name: tube-manager
    runtime: python
    plan: starter
    rootDir: tube-manager
    buildCommand: git fetch --unshallow || true && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DEPLOY_VERSION
        value: "2026-06-12-v10-refactored"
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1
