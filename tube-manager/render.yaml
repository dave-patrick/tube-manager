services:
  - type: web
    name: tube-manager
    runtime: python
    plan: starter
    buildCommand: pip install --no-cache-dir -r reqs.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    region: frankfurt
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true